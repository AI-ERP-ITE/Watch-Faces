<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Flowvault</title>
    <script>
      // GitHub Pages SPA redirect trick.
      // When GitHub Pages serves a 404 for a deep route (e.g. /Watch-Faces/balance-2),
      // this page captures the full path and redirects to index.html,
      // passing the original path as a query string so the SPA can restore it.
      var segmentCount = 1; // number of path segments in the repo name (1 for /Watch-Faces)
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?p=/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
